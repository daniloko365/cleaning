name: Verify and deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: novaclean-production
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://novacleanoc.com' }}
      CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME || 'novaclean-oc' }}
      CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      CLOUDFLARE_R2_BUCKET_NAME: ${{ vars.CLOUDFLARE_R2_BUCKET_NAME }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ADMIN_ACCESS_TOKEN: ${{ secrets.ADMIN_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Check deployment configuration
        id: cloudflare
        shell: bash
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" && -n "$CLOUDFLARE_D1_DATABASE_ID" && -n "$CLOUDFLARE_D1_DATABASE_NAME" && -n "$CLOUDFLARE_R2_BUCKET_NAME" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deployment skipped: configure the repository secrets and variables listed in CLOUDFLARE_DEPLOYMENT.md."
          fi
      - name: Prepare production Wrangler config
        if: steps.cloudflare.outputs.ready == 'true'
        run: npm run cf:prepare
      - name: Apply D1 migrations
        if: steps.cloudflare.outputs.ready == 'true'
        run: npx wrangler d1 migrations apply "$CLOUDFLARE_D1_DATABASE_NAME" --remote --config dist/server/wrangler.deploy.json
      - name: Deploy
        if: steps.cloudflare.outputs.ready == 'true'
        run: npx wrangler deploy --config dist/server/wrangler.deploy.json
      - name: Set admin secret
        if: steps.cloudflare.outputs.ready == 'true' && env.ADMIN_ACCESS_TOKEN != ''
        shell: bash
        run: printf '%s' "$ADMIN_ACCESS_TOKEN" | npx wrangler secret put ADMIN_ACCESS_TOKEN --config dist/server/wrangler.deploy.json
